services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sncp
      POSTGRES_USER: sncp
      POSTGRES_PASSWORD: change-me-db-password
    volumes:
      - sncp_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PYTHON_IMAGE: python:3.11-slim
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4420:4420"
    restart: unless-stopped

volumes:
  sncp_db_data:
